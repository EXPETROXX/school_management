<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teacher Profile Edit</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent:#5A73D8;
      --accent-2:#70C6E4;
      --btn-grad-1:#ffd166;
      --btn-grad-2:#f77f00;
    }

    html,body{
      height:100%;
      margin:0;
      font-family:"Poppins",sans-serif;
    }

    body{
      display:flex;
      min-height:100vh;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      overflow:hidden;
    }

    /* Sidebar */
    .sidebar {
      width:250px;
      padding:30px 18px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      border-right: 1px solid rgba(255,255,255,0.12);
      box-sizing:border-box;
      z-index: 2;
    }
    .sidebar img { width:120px; height:120px; border-radius:50%; border:3px solid #fff; object-fit:cover; }
    .sidebar h4 { margin:12px 0 6px; font-weight:600; }
    .sidebar p { margin:0; opacity:0.9; font-size:14px; }
    .sidebar a {
      margin-top:18px;
      color:#fff;
      text-decoration:none;
      padding:8px 18px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.2);
      transition:all .2s;
    }
    .sidebar a:hover { background:#fff; color:var(--accent); }

    /* Main content */
    .main {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
      box-sizing:border-box;
      position:relative;
    }

    .form-card {
      width:100%;
      max-width:720px;
      background:#fff;
      padding:34px;
      border-radius:14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      z-index:1;
      box-sizing:border-box;
    }

    .form-card h2 {
      text-align:center;
      margin-bottom:22px;
      color:#333;
      font-weight:600;
    }

    .form-control {
      border: none;
      border-bottom: 2px solid #ddd;
      border-radius: 0;
      padding-left:0.5rem;
      padding-right:0.5rem;
      box-shadow: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .form-control:focus {
      outline:none;
      border-bottom-color: var(--accent);
      box-shadow:none;
    }
    label { color:#555; font-weight:500; font-size:0.95rem; }

    /* Buttons */
    .action-btn {
      position: fixed;
      z-index: 9999;
      padding: 10px 18px;
      border-radius: 28px;
      font-weight:600;
      cursor:pointer;
      border:none;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      transition: transform .12s ease, box-shadow .12s ease;
      background: linear-gradient(135deg, var(--btn-grad-1), var(--btn-grad-2));
      color:#fff;
      user-select:none;
    }
    .action-btn:active { transform: scale(.98); }

    .cancel-btn {
      position: fixed;
      right:28px;
      bottom:28px;
      z-index:9998;
      padding:10px 16px;
      border-radius:28px;
      background:#6c757d;
      color:#fff;
      border:none;
      font-weight:600;
      box-shadow: 0 6px 16px rgba(0,0,0,0.14);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
    }

    @media (max-width:520px){
      .sidebar{ display:none; }
      .form-card{ margin: 12px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="avatar">
    <h4>{{ teacher.teacher_id.first_name }} {{ teacher.teacher_id.last_name }}</h4>
    <p>{{ teacher.department_id.department_name }}</p>
    <a href="{% url 'teacher_profile' %}">Back to Profile</a>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="form-card" id="formCard">
      <h2>Edit Your Profile</h2>
      <form id="profileForm" method="POST" novalidate>
        {% csrf_token %}

        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="first_name">First name</label>
            <input id="first_name" name="first_name" class="form-control" value="{{ teacher.teacher_id.first_name }}" required>
          </div>
          <div class="form-group col-md-6">
            <label for="last_name">Last name</label>
            <input id="last_name" name="last_name" class="form-control" value="{{ teacher.teacher_id.last_name }}" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" class="form-control" value="{{ teacher.teacher_id.email }}" required>
          </div>
          <div class="form-group col-md-6">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" class="form-control" value="{{ teacher.phone }}" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="age">Age</label>
            <input id="age" name="age" type="number" class="form-control" value="{{ teacher.age }}" required>
          </div>
        </div>

        <button type="submit" id="hiddenSubmit" style="display:none;"></button>
      </form>
    </div>
  </div>

  <button id="updateBtn" class="action-btn" aria-label="Update profile">Update</button>


  <script>
    (function(){
      const form = document.getElementById('profileForm');
      const updateBtn = document.getElementById('updateBtn');
      const hiddenSubmit = document.getElementById('hiddenSubmit');

      const requiredSelectors = 'input[required]';
      const requiredInputs = () => Array.from(form.querySelectorAll(requiredSelectors));

      function placeBtnCenter() {
        const card = document.getElementById('formCard').getBoundingClientRect();
        const btnW = updateBtn.offsetWidth;
        const left = card.left + (card.width/2) - (btnW/2);
        const top = card.top + card.height + 14;
        updateBtn.style.left = Math.max(8, Math.min(window.innerWidth - btnW - 8, left)) + 'px';
        updateBtn.style.top = Math.max(8, Math.min(window.innerHeight - updateBtn.offsetHeight - 8, top)) + 'px';
      }

      function allFilled() {
        return requiredInputs().every(inp => inp.value.trim() !== '');
      }

      function moveBtnRandom() {
        const btnW = updateBtn.offsetWidth;
        const btnH = updateBtn.offsetHeight;
        const padding = 16;
        const maxX = window.innerWidth - btnW - padding;
        const maxY = window.innerHeight - btnH - padding;
        const x = Math.floor(Math.random() * (Math.max(1, maxX - padding))) + padding;
        const y = Math.floor(Math.random() * (Math.max(1, maxY - padding))) + padding;
        updateBtn.style.transition = 'left 240ms ease, top 240ms ease';
        updateBtn.style.left = x + 'px';
        updateBtn.style.top = y + 'px';
      }

      function handleInputs() {
        if (allFilled()) {
          updateBtn.style.transition = 'left 200ms ease, top 200ms ease';
          placeBtnCenter();
          updateBtn.dataset.locked = 'true';
        } else {
          updateBtn.dataset.locked = 'false';
        }
      }

      document.addEventListener('mousemove', (e) => {
        if (!allFilled()) {
          const rect = updateBtn.getBoundingClientRect();
          const dx = e.clientX - (rect.left + rect.width/2);
          const dy = e.clientY - (rect.top + rect.height/2);
          const dist = Math.hypot(dx, dy);
          if (dist < 140) moveBtnRandom();
        }
      });

      updateBtn.addEventListener('click', (ev) => {
        if (allFilled()) hiddenSubmit.click();
        else {
          ev.preventDefault();
          moveBtnRandom();
        }
      });

      form.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' && !allFilled()) ev.preventDefault();
      });

      requiredInputs().forEach(inp => inp.addEventListener('input', handleInputs));

      window.addEventListener('resize', () => {
        handleInputs();
        if (allFilled()) placeBtnCenter();
      });

      window.addEventListener('load', () => {
        setTimeout(() => {
          handleInputs();
          if (allFilled()) updateBtn.dataset.locked = 'true';
          placeBtnCenter();
        }, 120);
      });

      updateBtn.setAttribute('tabindex','0');
    })();
  </script>
</body>
</html>
