<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | School Management System</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    display: flex;
    flex-direction: column;
}

/* ===== Sticky Navbar ===== */
.navbar {
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(15, 23, 42, 0.85);
    padding: 12px 0;
}

.navbar-brand {
    font-weight: 700;
    font-size: 1.4rem;
    color: #ffffff !important;
}

.nav-link {
    color: #e2e8f0 !important;
    font-weight: 500;
    transition: 0.3s;
}

.nav-link:hover {
    color: #38bdf8 !important;
}

/* ===== Login Section ===== */
.login-section {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 120px;
    padding-bottom: 40px;
}

/* ===== Glass Login Card ===== */
.login-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    padding: 40px;
    width: 100%;
    max-width: 400px;
    color: white;
    animation: fadeUp 0.8s ease;
}

.login-card h2 {
    font-weight: 700;
    margin-bottom: 25px;
    text-align: center;
}

/* Inputs */
.form-control {
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
}

.form-control:focus {
    box-shadow: 0 0 8px #38bdf8;
}

/* Button */
.btn-login {
    width: 100%;
    padding: 10px;
    border-radius: 25px;
    font-weight: 600;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
    border: none;
    color: white;
    transition: 0.3s;
}

.btn-login:hover {
    background: linear-gradient(90deg, #0ea5e9, #0284c7);
}

/* Signup Text */
.signup-text {
    margin-top: 15px;
    text-align: center;
    font-size: 0.9rem;
}

.signup-text a {
    color: #38bdf8;
    font-weight: 600;
    text-decoration: none;
}

.signup-text a:hover {
    text-decoration: underline;
}

/* Footer */
footer {
    text-align: center;
    padding: 12px 0;
    color: #e2e8f0;
    background: rgba(15, 23, 42, 0.9);
}

/* Animation */
@keyframes fadeUp {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== Responsive Fix ===== */
@media (max-width: 576px) {
    .login-card {
        padding: 30px 20px;
    }
}
</style>
</head>

<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">My School</a>

    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="{% url 'home_page' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ===== Login Section ===== -->
<section class="login-section">
  <div class="login-card">
    <h2>Welcome Back 👋</h2>

    <form method="post">
      {% csrf_token %}
      <input type="text" name="username" class="form-control" placeholder="Username" required>
      <input type="password" name="password" class="form-control" placeholder="Password" required>
      <button type="submit" class="btn btn-login mt-2">Login</button>
    </form>

    <div class="signup-text">
      Don’t have an account? <br>
      <a href="{% url 'register_student' %}">Sign up as Student</a> |
      <a href="{% url 'register_teacher' %}">Teacher</a>
    </div>
  </div>
</section>

<!-- ===== Footer ===== -->
<footer>
  © 2026 School Management System | Developed by Jithesh
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
